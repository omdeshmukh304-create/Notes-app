version: '3.8'

services:
  web:
    image: ${DOCKERHUB_USERNAME}/my-app:${DOCKER_TAG}
    container_name: devops-dashboard

    ports:
      - "5000:5000"

    environment:
      - FLASK_ENV=production

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3