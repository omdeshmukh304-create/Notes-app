<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
  <style>
    :root {
  --viewbtn-bc: hsl(220, 23%, 97%);
  --app-bc: hsl(0, 0%, 100%);
  --border-c: hsl(220, 13%, 91%);
  --addbtn-c: hsl(0, 0%, 100%);
  --addbtn-bc: hsl(0, 0%, 0%);
  --hoveraddbtn: hsl(0, 0%, 14%);
  --cselect-c: hsl(215, 19%, 35%);
  --cselect-bc: hsl(210, 40%, 96%);
  --Acselect-bc: hsl(0, 0%, 0%);
  --Acselect-c: hsl(0, 0%, 100%);
  --sidebar-bc: hsl(0, 14%, 95%);
  --forminput-bc: hsl(0, 20%, 96%);
  --Ntitle-bc: transparent;
  --hoveracselect: hsl(0, 0%, 0%);
  --confirmD-bc: hsl(0, 2%, 13%);
  --confirmD-c: hsl(0, 0%, 100%);
  --toast-bc: hsl(0, 0%, 18%);
  --footer-inside: hsl(0, 1%, 14%);
  --search-cross: hsl(0, 0%, 0%);
  --savebtn-bc: hsl(0, 0%, 90%);
  --hvrsavebtn-bc: hsl(0, 0%, 80%);
  --savebtn-c: hsl(0, 0%, 5%);
  --hoversavebtn: hsl(0, 0%, 25%);
  --header-botm-border: hsl(0, 6%, 82%);
  --Edialog-bc: hsl(0, 0%, 0%);
  --text: hsl(0, 0%, 0%);
  --categories-bc: hsl(0, 0%, 100%);
  --svg-bc: hsl(0, 0%, 0%);
  --hr: hsl(0, 0%, 95%);
  --text-footer: hsl(0, 0%, 0%);
  --white-text: hsl(0, 0%, 95%);
  --dialog-bc: hsl(0, 0%, 95%);
  --formborder-c: gray;
  --work: hsl(120, 45%, 78%);
  --study: hsl(234, 45%, 78%);
  --personal: hsl(37, 55%, 78%);
  --idea: hsl(282, 45%, 78%);
  --other: hsl(0, 0%, 85%);
  --workDialTitle-bc: var(--work);
  --studyDialTitle-bc: var(--study);
  --personalDialTitle-bc: var(--personal);
  --ideaDialTitle-bc: var(--idea);
  --otherDialTitle-bc: var(--other);
  --action-bc: hsl(0, 0%, 15%);
}


.dark-theme {
  --viewbtn-bc: hsl(0, 0%, 6%);
  --app-bc: hsl(0, 0%, 0%);
  --border-c: hsl(0, 0%, 0%);
  --addbtn-bc: hsl(0, 0%, 80%);
  --addbtn-c: hsl(0, 0%, 95%);
  --hoveraddbtn: hsl(0, 0%, 70%);
  --cselect-c: hsl(0, 0%, 40%);
  --cselect-bc: hsl(0, 0%, 10%);
  --Acselect-bc: hsl(0, 0%, 20%);
  --Acselect-c: hsl(0, 0%, 90%);
  --sidebar-bc: hsl(0, 0%, 5%);
  --forminput-bc: hsl(0, 0%, 20%);
  --hoveracselect: hsl(0, 0%, 20%);
  --footer-inside: hsl(0, 0%, 80%);
  --search-cross: hsl(0, 0%, 10%);
  --header-botm-border: hsl(0, 0%, 10%);
  --Edialog-bc: hsl(0, 0%, 10%);
  --text: hsl(0, 0%, 90%);
  --categories-bc: hsl(0, 0%, 0%);
  --Ntitle-bc: transparent;
  --svg-bc: hsl(0, 0%, 90%);
  --hr: hsl(0, 0%, 10%);
  --text-footer: hsl(0, 0%, 30%);
  --savebtn-bc: hsl(0, 0%, 95%);
  --savebtn-c: hsl(0, 0%, 5%);
  --hvrsavebtn-bc: hsl(0, 0%, 85%);
  --hvrsavebtn-c: hsl(0, 0%, 5%);
  --white-text: hsl(0, 0%, 95%);
  --dialog-bc: hsl(0, 0%, 10%);
  --formborder-c: hsl(0, 0%, 10%);
  --work: hsl(120, 45%, 78%);
  --study: hsl(234, 45%, 78%);
  --personal: hsl(37, 55%, 78%);
  --idea: hsl(282, 45%, 78%);
  --other: hsl(0, 0%, 85%);
  --workDialTitle-bc: var(--work);
  --studyDialTitle-bc: var(--study);
  --personalDialTitle-bc: var(--personal);
  --ideaDialTitle-bc: var(--idea);
  --otherDialTitle-bc: var(--other);
  --action-bc: hsl(0, 0%, 0%);
}

#activeView svg {
  fill: var(--text);
}

.actions {
  align-items: center;
  display: flex;
  gap: 20px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}


#toast {
  background-color: var(--toast-bc);
  font-weight: 600;

  padding: 20px;
}

body {
  background-color: var(--app-bc);
  display: grid;
  /* grid-template-columns:100px 1fr; */
  grid-template-columns: 100px 1fr;
  grid-template-rows: 5fr 50px;
  height: 100vh;
  position: relative;
}

body button {
  cursor: pointer;
}

#notesContainer,
#pinnedNotesContainer {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}

#sidebar {
  background: var(--sidebar-bc);
  border: 1px solid var(--border-c);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  gap: 20px;
  grid-row: 1/3;
  grid-column: 1/2;
}

#searchBtn {
  cursor: pointer;
  padding-left: 20px;
}

#searchBtn svg {
  fill: var(--svg-bc);
}

#mainContent {
  background: var(--app-bc);
  overflow-y: auto;

}

#notesContainer {
  /* padding: 20px; */
  position: relative;
}

#pinnedNotesContainer {
  border-bottom: 1px solid gray;
  /* margin: 0 20px;
  padding: 20px 0px; */
  border-bottom: 1px solid var(--header-botm-border);
}

#pinnedSection h4 {
  padding: 0 22px;
  color: var(--text);
}

@media (max-width: 768px) {
  body {
    grid-template-columns: 1fr;
    grid-template-rows: 5fr 50px;
  }

  #sidebar {
    display: none;
  }

  #footer {
    flex-direction: row;
  }

  #footer button {
    padding: 10px;
    height: 50px;
    border-top: none;
  }

  footer svg {
    width: 30px;
    height: 30px;
  }

  #archivedFooter {
    width: 50vw;
    border-left: 1px solid #4545;
  }

  #archivedFooter p {
    display: none;
  }

  #homeFooter {
    width: 50vw;
  }

  #notesContainer,
  #pinnedNotesContainer {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }

  .note-title {
    font-size: 1em;
  }

  .note-content {
    font-size: 0.8em;
  }
  .note-action button {
    width: 22px;
    height: 22px;
    font-size: 12px; 
  }

  .note-action button {
    opacity: 0.85;
  }

 
  .note-action button:hover .note-action button {
      width: 20px;
      height: 20px;
    }
  
  .note-action button:hover {
  opacity: 1;
}

.note-action button:hover  .note-action {
  gap: 4px;
}
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

hr {
  margin: 6px;
  border: 1px solid var(--hr);
}

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translate(-50%,20px);
  background: #333;
  color: #fff;
  padding: 10px 16px;
  border-radius: 6px;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
  font-size: 14px;
  z-index: 9999;
}

.toast.show {
  pointer-events: auto;
  opacity: 1;
  transform: translate(-50%,0);
}

.add-note-btn {
  position: fixed;
  right: 40px;
  bottom: 60px;
  outline: none;
  border: none;
  background-color: transparent;
}

.add-note-btn svg path {
  fill: var(--addbtn-bc);
}

.add-note-btn svg:hover {
  outline: none;
  border: none;
  background-color: transparent;

}

.add-note-btn svg:hover path {
  fill: var(--hoveraddbtn);
}



.category-selector {
  padding-bottom: 8px;
  border-bottom: 1px solid var(--header-botm-border);
}

.sorting-tags {
  padding: 2px 15px;
  color: var(--cselect-c);
  background-color: var(--cselect-bc);
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.sorting-tags:hover {
  transition: all 0.3s ease;
  background-color: var(--hoveracselect);
  color: var(--Acselect-c);
}

.sorting-tags.active {
  background-color: var(--Acselect-bc);
  color: var(--Acselect-c);
  transition: background-color 0.2s ease, color 0.2s ease;
  font-weight: 600;
}



.theme-toggle-btn {
  background: transparent;
  border: none;
  cursor: pointer;
}

.theme-toggle-btn svg {
  color: #9CA3AF;
  transition: transform 0.3s ease, color 0.2s ease;
}

.theme-toggle-btn:hover svg {
  transform: rotate(360deg);
}

#noteImage {
  width: 100px;
}

#noNoteCard {
  width: 200px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 100px auto;
}

footer {
  position: absolute;
  grid-row: 2/3;
  grid-column: 1/2;
  bottom: 0;
  left: 0;
  display: flex;
  flex-direction: column;
}

footer button {

  width: 100px;
  height: 100px;
  outline: none;
  border: none;
  background-color: var(--viewbtn-bc);
  display: flex;
  align-items: center;
  justify-content: center;

}

#archivedFooter {
  border-top: 1px solid #4545;
  flex-direction: column;
}

#archivedFooter path {
  color: var(--text-footer);
  font-weight: 600;
}

#archivedFooter.active path {
  fill: var(--svg-bc);
}

#archivedFooter.active p {
  color: var(--svg-bc);
}

#homeFooter.active path {
  fill: var(--svg-bc);
}

#searchBar {
  width: 100%;
  padding: 5px;
  position: relative;
  display: none;
}

#searchBar input {
  width: 100%;
  margin-left: auto;
  margin-right: auto;
  height: 30px;
  border-radius: 10px;
  font-weight: 600;
  background-color: var(--sidebar-bc);
  border: none;
  color: var(--text);
}

#searchBar input::placeholder {
  font-weight: 600;
  position: absolute;
  left: 20px;
}

#searchBar input:focus {
  padding-left: 20px;
  outline: none;
}

#searchBar button {
  color: white;
  font-weight: 600;
  position: absolute;
  right: 5px;
  top: 5px;
  bottom: 5px;
  width: 40px;
  background-color: var(--search-cross);
  border-radius: 10px;
  border: none;
}


#searchBar.active {
  display: block;
}

#sorting {
  padding: 10px;
  padding-bottom: 0;
}

header {
  border-bottom: 1px solid var(--header-botm-border);
  padding: 10px;
}

#noteDialog {
  margin: auto;
  width: 95vw;
  max-width: 400px;
  height: 65vh;
  border-radius: 5px;
  background-color: var(--dialog-bc);
  color: var(--text);
  border: none;
  box-shadow: 0px 0px 6px black;
}

#noteDialog hr {
  width: 100%;
  margin: auto;
}


#noteDialog .dialog-header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;

}
.dialog-header .close-btn{
  border: none;
  background-color:var(--dialog-bc);
  color: var(--text);
  font-size: 1.3em;
  font-weight: bold;
  text-align: center;
}

#noteDialog button {
  cursor: pointer;
}

#noteDialog.edit {
  width: 95vw;
  max-width: 400px;
  height: 100vh;
  background-color: var(--Edialog-bc);
  border-radius: 20px;
}

#noteDialog.edit .dialog-title,
#noteDialog.edit label {
  display: none;
}

#noteDialog.edit .close-btn {
  color: black;
  font-size: 1.8em;
  text-align: center;
  position: absolute;
  right: 5px;
  top: 0;
  bottom: 0;
  width: 50px;
}

#noteDialog.edit .dialog-header {
  position: relative;
  background-color: var(--Edialog-bc);
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#noteDialog.edit .dialog-header button {
  background-color: transparent;
  font-size: 1.5em;
  border: none;
  width: 30px;
  font-weight: 600;
  border-radius: 5px;
}

#noteDialog.edit #noteTitle {
  font-weight: 600;
  font-size: 1.8em;
  color: black;
  background-color: transparent;
  position: absolute;
  left: 10px;
  outline: none;
  border: none;
  top: -4px;
  width: 90%;
}

#noteDialog.edit #noteContent {
  color: black;
  height: 60vh;
  padding: 0;
  font-size: 1.3em;
  padding: 15px;
  border-radius: 0;
  padding-top: 0;
}

#noteDialog.edit textarea {
  background-color: transparent;
  border: none;
}

#noteDialog.personal.edit textarea {
  background-color: var(--personal);
}

.dark-theme #noteDialog.edit #noteTitle {
  color: black;
}

#noteDialog.work.edit .dialog-header {
  background-color: var(--workDialTitle-bc);
}

#noteDialog.study.edit .dialog-header {
  background-color: var(--studyDialTitle-bc);
}

#noteDialog.personal.edit .dialog-header {
  background-color: var(--personalDialTitle-bc);
}

#noteDialog.idea.edit .dialog-header {
  background-color: var(--ideaDialTitle-bc);
}

#noteDialog.other.edit .dialog-header {
  background-color: var(--otherDialTitle-bc);
}

#noteDialog.work.edit textarea {
  background-color: var(--work);
}

#noteDialog.study.edit textarea {
  background-color: var(--study);
}

#noteDialog.idea.edit textarea {
  background-color: var(--idea);
}

#noteDialog.other.edit textarea {
  background-color: var(--other);
}

#noteDialog.edit .categories {
  padding: 10px;
  background-color: var(--Edialog-bc);
  height: 20vh;
}

#noteDialog.edit .dialog-actions {
  padding-bottom: 40px;
  background-color: var(--Edialog-bc);
}

#noteDialog.edit .dialog-actions button {
  font-weight: 600;
}

#noteDialog.edit .dialog-actions .save-btn {
  background-color: var(--savebtn-bc);
  color: var(--savebtn-c);
}

#noteDialog.edit .dialog-actions .save-btn:hover {
  background-color: var(--hvrsavebtn-bc);
  color: var(--hvrsavebtn-c);
}

#noteDialog .dialog-actions .save-btn {
  background-color: var(--savebtn-bc);
  color: var(--savebtn-c);
}

#noteDialog .dialog-actions .save-btn:hover {
  background-color: var(--hvrsavebtn-bc);
  color: var(--hvrsavebtn-c);
}

#noteDialog.edit .categories p {
  color: var(--white-text);
}

#noteDialog .categories p {
  font-size: 1.3em;
  padding-bottom: 10px;
  color: var(--text);
}

#noteDialog.edit .form-group,
#noteDialog.edit form {
  padding: 0;
}



form {
  padding: 0px 20px 10px 20px;
  background-color: var(--form-bc);
}

form label {
  color: var(--text);
  padding-bottom: 5px;
  font-weight: 600;
}

.form-group {
  display: flex;
  flex-direction: column;
  padding-top: 10px;
}

#noteTitle {
  padding: 5px;
  background-color: var(--forminput-bc);
  outline: none;
  border: 1px solid var(--formborder-c);
  border-radius: 5px;
  color: var(--text);
  font-size: 1em;
}

#noteTitle,
#noteContent:focus {
  outline: none;
}

#noteContent {
  padding: 5px;
  background-color: var(--forminput-bc);
  outline: none;
  border: 1px solid var(--formborder-c);
  border-radius: 5px;
  height: 80px;
  color: var(--text);
  font-size: 1em;
}

.categories {
  padding-top: 5px;
  display: flex;
  flex-direction: column;
}

#categoryContainer {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}

.categories p {
  color: var(--text);
}

.categories button {
  cursor: pointer;
  height: 30px;
  background-color: var(--forminput-bc);
  border: none;
  border-radius: 5px;
  font-weight: 600;
}

.category[data-category="work"] {
  background-color: var(--work);
  transition: height 0.5s ease;
}

.category[data-category="study"] {
  background-color: var(--study);
  transition: height 0.5s ease;
}

.category[data-category="personal"] {
  background-color: var(--personal);
  transition: height 0.5s ease;
}

.category[data-category="idea"] {
  background-color: var(--idea);
  transition: height 0.5s ease;
}

.category[data-category="other"] {
  background-color: var(--other);
  transition: height 0.5s ease;
}

.category[data-category="work"].selected {
  height: 40px;
  transition: height 0.5s ease;

}

.category[data-category="study"].selected {
  height: 40px;
  transition: height 0.5s ease;
}

.category[data-category="personal"].selected {
  height: 40px;
  transition: height 0.5s ease;
}

.category[data-category="idea"].selected {
  height: 40px;
  transition: height 0.5s ease;
}

.category[data-category="other"].selected {
  height: 40px;
  transition: height 0.5s ease;
}

.category[data-category="work"]:hover {
  height: 40px;
  transition: height 0.5s ease;
}

.category[data-category="study"]:hover {
  height: 40px;
  transition: height 0.5s ease;
}

.category[data-category="personal"]:hover {
  height: 40px;
  transition: height 0.5s ease;
}

.category[data-category="idea"]:hover {
  height: 40px;
  transition: height 0.5s ease;
}

.category[data-category="other"]:hover {

  height: 40px;
  transition: height 0.5s ease;
}

.dialog-actions {
  position: absolute;
  bottom: 0;
  right: 0;
  padding:20px;
  padding-top: 0;
}

.save-btn,
.cancel-btn {
  margin-left: 10px;
  padding: 0 10px 0 10px;
  height: 30px;
  border: none;
  border-radius: 5px;
}

.save-btn {
  background-color: var(--savebtn-bc);
  color: hsl(0, 0%, 90%);
}

.cancel-btn {
  background-color: var(--savebtn-bc);
}

.save-btn:hover {
  background-color: var(--hoversavebtn);
}

.cancel-btn:hover,
#deleteConfirm:hover {
  background-color: hsl(0, 78%, 60%);
  color: hsl(0, 0%, 95%);
}



#noNoteCard {
  position: absolute;
  top: 50%;
  right: 50%;
  transform: translate(50%, 10%);
  overflow: hidden;
}

.note-card {


  border-radius: 20px;
  height: 100px;
  background-color: var(--other);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  transition: transform 0.2s ease-in-out;
}

.note-card:hover {
  .note-action button {
    display: inline-block;
  }

  transform: scale(1.03);
  transition: transform 0.2s ease-in-out;
  cursor: pointer;
}

.noteHead {
  display: flex;
  background-color: var(--Ntitle-bc);
  border-radius: 10px;
}

.note-title {
  width: 100%;
  overflow-y: auto;
  background-color: transparent;
  padding: 10px;

}

.dark-theme .note-title {
  color: hsl(0, 0%, 0%);
}

.dark-theme .note-content {
  color: hsl(0, 0%, 0%);
}

.note-content {
  overflow-y: auto;
  padding: 5px 10px 5px 10px;
  font-weight: 600;
  font-size: 12px;
}

.note-content,
.note-title {
  word-break: break-word;
  overflow-wrap: break-word;
}

.note-action {
  margin-top: 5px;
  background-color: transparent;
  padding: 5px;
  position: absolute;
  top: 3px;
  right: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}



.note-action button {
  border-radius: 50%;
  border: none;
  height: 25px;
  width: 25px;
  background-color: var(--action-bc);
  display: none;
}

.delete-btn {
  font-size: 18px;
  text-align: center;
  color: white;
}

.delete-btn:hover {
  background-color: hsl(0, 48%, 45%);
}

.pin-btn:hover {
  background-color: rgb(194, 125, 13);
}

.restore-btn {
  color: white;
}

.restore-btn:hover {
  background-color: hsl(120, 35%, 49%);
}


.note-card.work {
  background-color: var(--work);
}

.note-card.study {
  background-color: var(--study);
}

.note-card.personal {
  background-color: var(--personal);
}

.note-card.idea {
  background-color: var(--idea);
}

#confirmDialog {
  position: absolute;
  top: 40vh;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: var(--confirmD-bc);
  border-radius: 10px;
  color: var(--confirmD-c);
  border: none;
  padding: 10px;
}

#cancelBtn {
  background-color: black;
  color: white;
  border: none;
  padding: 5px;
  border-radius: 10px;
}

#deleteConfirm {
  color: white;
  background-color: black;
  border: none;
  padding: 5px;
  border-radius: 10px;

}

#confirmButtons {
  padding-top: 20px;
  font-weight: 600;
  gap: 10px;
  display: flex;
  justify-content: end;
}

body {
  position: relative;
}

#homeTitle {
  color: var(--text);
}

.dark-theme header {
  background-color: hsl(0, 0%, 7%);
}




.loading-container {
  position:fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--text);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--border-c);
  border-top: 4px solid var(--svg-bc);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 10px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.error-container {
  position:fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: var(--text);
}

.error-container button {
  margin-top: 10px;
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  background: var(--addbtn-bc);
  color: var(--addbtn-c);
  cursor: pointer;
}

.error-container button:hover {
  background: var(--hoveraddbtn);
}



.empty-container {
  position: absolute;
  top: 50%;
  left: 50%;
  margin-top: 100px;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--text);
}



.note-card {
  opacity: 0;
  animation: fadeIn 0.3s ease forwards;
}

.note-inner {
  transform: translateY(10px);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}


.note-card:hover .note-inner {
  transform: translateY(-4px);
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}

#notesContainer {
  padding: 24px;
}

mark {
  background: #ffd54f;
  color: black;
  padding: 0 2px;
  border-radius: 3px;
}

.dark-theme .note-card.work mark {
  background: hsl(120, 40%, 40%);
  color: white;
}

.dark-theme .note-card.study mark {
  background: hsl(234, 40%, 40%);
  color: white;
}

.dark-theme .note-card.personal mark {
  background: hsl(37, 50%, 45%);
  color: white;
}

.dark-theme .note-card.idea mark {
  background: hsl(282, 40%, 45%);
  color: white;
}

.dark-theme .note-card.other mark {
  background: hsl(0, 0%, 40%);
  color: white;
}

.focused-note .note-inner {

}

.note-card:hover {

//main Event listner
document.addEventListener('DOMContentLoaded', function(){
  applyStoredTheme();
  initNotes();


  const defaultBtn=document.querySelector('[data-category="all"]');
  if(defaultBtn)defaultBtn.classList.add('active');
  filteringNotes()
  viewStyle();

  document.getElementById('searchInput').addEventListener('input', function(event){
    selectedNoteIndex=-1;
   searchQuery= event.target.value.toLowerCase(); 
   clearTimeout(searchtimer)
   searchtimer=setTimeout(() => {
    filteringNotes();
   }, 300);
   
  })

  document.getElementById('themeToggleBtn').addEventListener('click',toggleTheme)

  document.getElementById('noteForm').addEventListener('submit',saveNote)

  document.getElementById('noteDialog').addEventListener('click', function(event){
   
      if(event.target === this) {
        closeNoteDialog()
      }
  })

  document.querySelector('.dialog-content').addEventListener('click', function (event) {
    event.stopPropagation();
  });

  document.querySelector('.close-btn').addEventListener('click',()=>{
    closeNoteDialog();
  })
  

  document.querySelector('.category-selector').addEventListener('click',(e)=>{
    const btn=e.target.closest('.sorting-tags');
    if(!btn)return;

    const category=btn.dataset.category;
    if(activeCategory===category)return;

    removeActive();
    btn.classList.add('active');
    activeCategory=category;
    filteringNotes();

  })


  document.getElementById('categoryContainer').addEventListener('click',(e)=>{
    const btn=e.target.closest('.category');
    if(!btn)return;

    removeSelectCategory();
    btn.classList.add('selected');
    changeCategory=btn.dataset.category;
  });

  document.getElementById('archivedFooter').addEventListener('click',function(event){
    activeview='archive';
    activeCategory='all';
    searchQuery='';
    viewStyle();
    updateTitle();
    filteringNotes();
    
  })

  document.getElementById('homeFooter').addEventListener('click',function(event){
    
    activeview='home';
    activeCategory='all';
    searchQuery='';
    viewStyle();
    updateTitle();
    filteringNotes();
    
  })

  document.getElementById('searchBtn').addEventListener('click',function(){
    document.getElementById('searchBar').classList.add('active');
    document.getElementById('searchInput').focus();
  })

  document.getElementById('closeSearch').addEventListener('click',function(){
    searchQuery="";
    selectedNoteIndex=-1;
    document.getElementById('searchBar').classList.remove('active');
    document.getElementById('searchInput').value="";
    filteringNotes();
  })

  document.getElementById('addBtn').addEventListener('click',function(){
    dialogMode='add';
    openNoteDialog()
  })

  document.querySelector('.cancel-btn').addEventListener('click',()=>{
    closeNoteDialog()}
  );

  document.querySelector('.notes-grid').addEventListener('click',function(event){


    const pinBtn=event.target.closest('.pin-btn');
    if(pinBtn){
      const id=pinBtn.dataset.id;
      togglePin(id);
      return
    }
    
    const delBtn=event.target.closest('.delete-btn');
    if(delBtn){
      const id=delBtn.dataset.id;
      openConfirm(id);
      return;
    }

    const restoreBtn=event.target.closest('.restore-btn');
    if(restoreBtn){
      const id=restoreBtn.dataset.id;
      restoreNote(id);
      return;
    }

    
    const noteCard=event.target.closest('.note-card');
    if(!noteCard) return;

    document.querySelectorAll('.note-card').forEach(card => {
      card.classList.remove('focused-note');
    });

    noteCard.classList.add('focused-note');
    console.log(noteCard);
    noteCard.scrollIntoView({
        behavior: "smooth",
        block: "center"
    });
    

    const noteId=noteCard.dataset.id;
    const noteCategory=noteCard.dataset.category;


    removeCategory();
    document.getElementById('noteDialog').classList.add(noteCategory)
    editingNoteId=noteId;
    setTimeout(() => {
      openNoteDialog(noteId);
    }, 200);
    
  })


  document.addEventListener('keydown',function(event){
    if(!searchQuery)return;

    const visibleNotes=document.querySelectorAll('.note-card');
    if(visibleNotes.length === 0)return;

    if(event.key==='ArrowDown'){
      selectedNoteIndex++;
      if(selectedNoteIndex >= visibleNotes.length){
        selectedNoteIndex=0;
      }
        updateFocus(visibleNotes);
      }
    if(event.key === 'ArrowUp'){
      selectedNoteIndex--;
      if(selectedNoteIndex<0){
        selectedNoteIndex=visibleNotes.length-1;
      }
      updateFocus(visibleNotes);
    }
    if(event.key === 'Enter'){
      if(selectedNoteIndex >= 0){
        visibleNotes[selectedNoteIndex].click();
      }
    }
  })

})

 function togglePin(ID){
   if(!ID) return;//guard

   let note=notes.find(n=>n.id==ID)
   if(!note) return;//guard

   note.pinned=!note.pinned

   saveNotes();
   filteringNotes();
 }
 function permanentlyDelete(id){
   if(!id)return

   notes=notes.filter(n=>n.id !== id)

   saveNotes();
   filteringNotes();
 }



function restoreNote(ID){
  if(!ID) return;

  let n=notes.find(note=>{
    return note.id===ID
  })
  if(!n) return;

  n.archived=false;

  saveNotes();
  filteringNotes();
}


function archiveNote(noteId){
  if(!noteId) return;//guard


  let archive=notes.find(n=>n.id===noteId);
  if(!archive||archive.archived===true){return}
  else{
    archive.archived=true;
  }

  if(undoTimer){
    clearTimeout(undoTimer);
  }

  lastArchiveNoteId=noteId;

  undoTimer=setTimeout(()=>{
    undoTimer=null;
    lastArchiveNoteId=null;
    hideToast();
  },5000)

  saveNotes();
  filteringNotes();
  showUndoToast();
}


function filteringNotes(){
  let filterNotes=[]; 
  
  if(activeview==='home'){
    filterNotes=notes.filter(note=>!note.archived)
  }else{
    filterNotes=notes.filter(note=>note.archived)
  }
  
  
  if(activeCategory!=='all'){
    filterNotes=filterNotes.filter(note=>note.category===activeCategory);
  }

  
  if(!searchQuery.trim()){
    renderNotes(filterNotes);
    return;
  }else{
    filterNotes=filterNotes.filter(note =>note.title.toLowerCase().includes(searchQuery)||note.content.toLowerCase().includes(searchQuery));
    
  }
   if(filterNotes.length===0){
    showToast('No matching notes found');
    document.querySelector('#pinnedSection').style.display='none';
    document.querySelector('#notesContainer').innerHTML=`<div class='no-notes'>No Notes Found</div>`
    return;
   }else{
    renderNotes(filterNotes);
   }
}

function undoNotes(){
  if(!lastArchiveNoteId)return;

  let note=notes.find(n=>n.id===lastArchiveNoteId);
  if(!note) return;

  note.archived=false;

  clearTimeout(undoTimer)
  undoTimer=null;
  lastArchiveNoteId=null;

  if(toastTimer){
    clearTimeout(toastTimer);
    toastTimer=null;
  }

  saveNotes();
  filteringNotes();
}


function saveNote(event){
  event.preventDefault()

  const Title=document.getElementById('noteTitle').value.trim();
  const Content=document.getElementById('noteContent').value.trim();

  if(!Title || !Content){
  showToast("Title & content cannot be empty");
  return;
  }

  if(editingNoteId !== null){
    const noteIndex = notes.findIndex(note =>note.id === editingNoteId)
    if(noteIndex===-1){
      showToast('Note No longer Exist');
      editingNoteId=null;
      closeNoteDialog();
      return
    }
    
      notes[noteIndex]={
      ...notes[noteIndex],
      title: Title,
      content: Content,
      category:changeCategory,
      }
      editingNoteId=null;
  

  }else{
      notes.unshift({
        id: generateId(),
        title: Title,
        content: Content,
        pinned: false,
        createdAt:Date.now(),
        category:changeCategory,
        archived:false
      })
  }



  
  closeNoteDialog();
  saveNotes();
  filteringNotes();
}


function renderNotes(filteredNotes) {
  const notesContainer = document.getElementById('notesContainer');
  const pinnedNotesContainer = document.getElementById('pinnedNotesContainer');
  const hidePinned = document.getElementById('pinnedSection');
  const data = filteredNotes || notes;
  if (data.length === 0) {
    notesContainer.innerHTML = `<p class='no-notes'>No notes found</p>`;
    pinnedNotesContainer.innerHTML = '';
    hidePinned.style.display = 'none';
    return;
  }


  if (activeview === 'home') {
    const pinnedNotes =[];
    const unpinnedNotes = [];

    data.forEach(note=> {
      if(note.pinned)pinnedNotes.push(note);
      else unpinnedNotes.push(note);
    });

    hidePinned.style.display = pinnedNotes.length ? "block" : "none";
    pinnedNotesContainer.innerHTML = pinnedNotes.map((note, index) => createNoteCard(note, index)).join('')


    notesContainer.innerHTML = unpinnedNotes.map(createNoteCard).join('')
  } else {
    hidePinned.style.display = 'none';
    pinnedNotesContainer.innerHTML='';
    notesContainer.innerHTML = data.map((note, index) => createNoteCard(note, index)).join('')
  }

}

function highlightText(text, query) {
  if (!query||!query.trim()) {
    return text;
  }
  const safeQueryText = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const pattern = new RegExp(safeQueryText, "gi");
  const updatedText = text.replace(pattern, match => `<mark>${match}</mark>`);
  return updatedText;
}

function saveNotes() {
  localStorage.setItem('quickNotes', JSON.stringify(notes))
}


async function initNotes() {
  setLoading(true);
  const notesContainer = document.getElementById('notesContainer');
  notesContainer.innerHTML = "";
  try {
    notes = await loadNotes();

    if (notes.length === 0) {
      showEmptyspace();
    } else {
      filteringNotes(notes);
    }
  } catch (err) {
    setErrorUI(err.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(isloading) {
  const loading = document.getElementById("loading");
  if (isloading) {
    loading.style.display = 'block';
  } else {
    loading.style.display = "none";
  }
}

function setErrorUI(err) {
  const notesContainer = document.getElementById('notesContainer');
  
  
  
  notesContainer.innerHTML = ` <div id="error" class="error-container">
      <h3>Something went wrong</h3>
      <p>${err}</p>
      <button onclick="initNotes()">Retry</button>
    </div>
    `
}

function showEmptyspace(){
  const notesContainer = document.getElementById('notesContainer');
  notesContainer.innerHTML=`<div class="empty-container">
      <h3>No notes yet</h3>
      <p>Create your first note</p>
    </div>`
}

async function loadNotes() {
  return new Promise((resolve, reject) => {
    setTimeout(() => {
      try {
         if (Math.random() < 0.2) {
          throw new Error('Failed To Get The Notes')
        }

        const savedNotes = localStorage.getItem('quickNotes');
        const notes=savedNotes ? JSON.parse(savedNotes) : [];

        resolve(notes);
      } catch (err) {
        reject(err);
      }
    }, 800);

  })
}


function showUndoToast(){
  let toast=document.getElementById('toast');
  let msg=document.getElementById('toastMsg');
  let undoBtn=document.getElementById('undoBtn');

  if(toastTimer) clearTimeout(toastTimer);

  msg.textContent='Note Archived';
  undoBtn.style.display='inline-block';

  toast.classList.add('show');

  undoBtn.onclick=function(){
    undoNotes();
    hideToast();
  }

}

function hideToast(){
   let toast=document.getElementById('toast');
   let undoBtn=document.getElementById('undoBtn');

   if(toastTimer){
    clearTimeout(toastTimer)
    toastTimer=null
   }

   toast.classList.remove('show');
   undoBtn.style.display='none';
}


function removeCategory(){
  document.getElementById('noteDialog').classList.remove('work','study','personal','idea','other')
}


function viewStyle(){if(activeview==='archive'){
    document.getElementById('homeFooter').classList.remove('active')
    document.getElementById('archivedFooter').classList.add('active')
  }else{
    document.getElementById('archivedFooter').classList.remove('active')

  }}

}

        <p>Are you sure you want to delete this note? this note will be archived</p>

  }else{

        <button onclick="cancleDelete()" id="cancelBtn">Cancel</button>

      </div>

function cancleDelete(){

}


 function openNoteDialog(noteId = null){
   const dialog=document.getElementById('noteDialog');
   const titleInput=document.getElementById('noteTitle');
   const contentInput=document.getElementById('noteContent');
   let dynamicButton=document.querySelector('.cancel-btn');
     if(noteId){
     
     const noteToEdit =notes.find(note => note.id == noteId)
     editingNoteId=noteId
     document.getElementById('dialogTitle').textContent ='Edit Note'
     dynamicButton.textContent='Discard';
     changeCategory=noteToEdit.category
     removeSelectCategory()
     const dialog = document.getElementById('noteDialog');

     dialog.querySelector(`[data-category="${changeCategory}"]`)?.classList.add('selected');
     titleInput.value =noteToEdit.title
     contentInput.value=noteToEdit.content
     dialog.classList.add('edit')
   }else{
     removeSelectCategory();
     dialog.classList.remove('edit')
     editingNoteId=null
     document.getElementById('dialogTitle').textContent='Add New Note'
     titleInput.value=''
     contentInput.value=''
     changeCategory='other'
   }
   dialog.showModal();
   titleInput.focus();
 }




function closeNoteDialog(){
  document.getElementById('noteDialog').close();
}

 const isDark= document.body.classList.toggle('dark-theme');
 localStorage.setItem('theme',isDark ? 'dark' : 'light');
 document.getElementById('themeToggleBtn').innerHTML= isDark ? sun: moon;
}

function applyStoredTheme(){

  let themeBtn=document.getElementById('themeToggleBtn');

  if(savedTheme==='dark'){
    document.body.classList.add('dark-theme');
    themeBtn.innerHTML=sun
  }else{
    themeBtn.innerHTML=moon
  }

function removeActive(){
  let sortingTags=document.querySelectorAll('.sorting-tags');
  sortingTags.forEach(tag=>tag.classList.remove('active'))
}
function removeSelectCategory(){
  const dialog = document.getElementById('noteDialog');

  dialog.querySelectorAll('.category').forEach(tag =>
    tag.classList.remove('selected')
  );
}

function showToast(message){
  if(lastArchiveNoteId)return;

  const toast = document.getElementById('toast');
  let msg=document.getElementById('toastMsg');
  let undoBtn=document.getElementById('undoBtn');

  if(toastTimer) clearTimeout(toastTimer);

  undoBtn.style.display='none';
  msg.textContent=message;
  toast.classList.add('show');
  
  toastTimer=setTimeout(() => {
    hideToast();
  }, 1500); 
}

function updateFocus(visibleNotes){
  document.querySelectorAll('.note-card').forEach(note=>{
    note.classList.remove('focused-note');
  })

  const selected=visibleNotes[selectedNoteIndex];
  if(!selected)return;

  selected.classList.add('focused-note');
  selected.scrollIntoView({
    behavior:"smooth",
    block:"center"
  })
}

function updateTitle(){
  const title = document.getElementById('homeTitle');
  title.textContent = activeview === 'home' ? 'Notes' : 'Archived Notes';
}
