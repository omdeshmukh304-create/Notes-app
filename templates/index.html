<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Notes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  </aside>

  <main class="main-content" id="mainContent">
    <header>
      <h1 id="homeTitle">Notes</h1>

      <div class="actions">
        <label id="searchBtn">
          <svg fill="#000000" width="18px" height="18px" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12.027 9.92L16 13.95 14 16l-4.075-3.976A6.465 6.465 0 0 1 6.5 13C2.91 13 0 10.083 0 6.5 0 2.91 2.917 0 6.5 0 10.09 0 13 2.917 13 6.5a6.463 6.463 0 0 1-.973 3.42zM1.997 6.452c0 2.48 2.014 4.5 4.5 4.5 2.48 0 4.5-2.015 4.5-4.5 0-2.48-2.015-4.5-4.5-4.5-2.48 0-4.5 2.014-4.5 4.5z"
              fill-rule="evenodd" />
          </svg>
        </label>

        <button id="themeToggleBtn" class="theme-toggle-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.79A9 9 0 1111.21 3
              a7 7 0 009.79 9.79z" fill="currentColor" />
          </svg>

        </button>
      </div>
    </header>


    <section class="controls" id="sorting">
      <div id="searchBar">
        <input type="text" placeholder="Search Notes" class="search-input" id="searchInput">
        <button id="closeSearch">X</button>
      </div>
      <div class="category-selector">
        <button class="sorting-tags" data-category="all">All</button>
        <button class="sorting-tags" data-category="work">Work</button>
        <button class="sorting-tags" data-category="study">Study</button>
        <button class="sorting-tags" data-category="personal">Personal</button>
        <button class="sorting-tags" data-category="idea">Idea</button>
        <button class="sorting-tags" data-category="other">Other</button>
      </div>
    </section>

    <section class="feedback-ui">
      <div class="toast" id="toast">
        <span id="toastMsg"></span>
        <button id="undoBtn">Undo</button>
      </div>

      <div id="loading" class="loading-container">
        <div class="spinner"></div>
        <p>Loading notes...</p>
      </div>
    </section>


    <section class="notes-grid">
      <div class="pinned-section" id="pinnedSection">
        <h4>Pinned Notes</h4>
        <div id="pinnedNotesContainer">

        </div>
      </div>
      <div id="notesContainer"></div>
    </section>

    <dialog id="noteDialog">
      <div class="dialog-content">
        <div class="dialog-header">
          <h3 class="dialog-title" id="dialogTitle">Add Note</h3>
          <button class="close-btn">x</button>
        </div>
        <form id="noteForm">
          <div class="form-group" id="firstInput">
            <label for="noteTitle" class="form-label">Title</label>
            <input type="text" id="noteTitle" class="form-input" placeholder="Enter note title" required>
          </div>


          <div class="form-group">
            <label for="noteContent" class="form-label">Content</label>
            <textarea id="noteContent" class="form-textarea" placeholder="Enter note content" required></textarea>
          </div>

          <div class="categories">
            <p>Category</p>
            <div id="categoryContainer">
              <button class="category" type="button" data-category="work">Work</button>
              <button class="category" type="button" data-category="personal">Personal</button>
              <button class="category" type="button" data-category="study">Study</button>
              <button class="category" type="button" data-category="idea">Ideas</button>
              <button class="category" type="button" data-category="other">Other</button>
            </div>
          </div>

          <div class="dialog-actions">
            <button type="button" class="cancel-btn">cancel</button>
            <button type="submit" class="save-btn">Save Note</button>
          </div>

        </form>
      </div>

    </dialog>
    <dialog id="confirmDialog">

    </dialog>


    <button class="add-note-btn" id="addBtn">


      <?xml version="1.0" encoding="utf-8"?>


      <svg width="60px" height="60px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g id="style=fill">
          <g id="add">
            <path id="Subtract" fill-rule="evenodd" clip-rule="evenodd"

              fill="#000000" />
          </g>
        </g>
      </svg>
    </button>



  </main>
  <footer id="footer">

    <button id="homeFooter"><svg width="30px" height="30px" viewBox="-1.6 -1.6 19.20 19.20" fill="none"
        xmlns="http://www.w3.org/2000/svg" stroke="" transform="matrix(1, 0, 0, 1, 0, 0)rotate(0)">
        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
        <g id="SVGRepo_iconCarrier">
          <path d="M1 6V15H6V11C6 9.89543 6.89543 9 8 9C9.10457 9 10 9.89543 10 11V15H15V6L8 0L1 6Z" fill="#4545">
          </path>
        </g>
      </svg></button>

      </svg>
      <p>Archived</p>
    </button>


  </footer>
  <script src="storage.js"></script>
  <script src="notesServices.js"></script>
  <script src="render.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>

</html>
